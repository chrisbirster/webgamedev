{{- define "navLink" -}}
<li class="px-5 py-2">
  <a href="{{ .Path }}"
    class="underlined block whitespace-nowrap text-lg font-medium hover:text-indigo-700 focus:text-indigo-700 focus:outline-none {{ if .IsCurrentPage }}active text-team-current{{ else }}text-secondary{{ end }}">
    {{ .Name }}
  </a>
</li>
{{- end -}}

{{define "navbar"}}
<div class="px-5vw py-9 lg:py-12 z-0">
  <nav class="text-primary mx-auto flex w-full items-center justify-between">
    <div class="flex justify-center gap-4 align-middle mx-10">
      <a href="/"
        class="text-primary underlined block whitespace-nowrap text-2xl font-medium transition focus:outline-none">
        <h1 class="tracking-widest">{{ .Name }}</h1>
      </a>
    </div>
    <input type="text" class="hidden lg:block text-indigo-700 w-1/3 h-10 rounded-lg bg-gray-100 px-4"
      placeholder="Search..." />

    <ul class="hidden lg:flex">
      {{- range .NavLinks }}
      {{ template "navLink" . }}
      {{- end }}
    </ul>
    <ul class="ml-10 flex items-center justify-center gap-4">
      <li class="group">
        {{ template "xwitter-icon" dict "Hover" true . }}
      </li>
      <li class="group">
        {{ template "youtube-icon" dict "Hover" true . }}
      </li>
    </ul>

    <div class="flex items-center justify-center">
      <div class="block lg:hidden">
        <!-- MobileMenu goes here -->
      </div>
      <div class="noscript-hidden hidden lg:block">
        <!-- DarkModeToggle goes here -->
      </div>

      <!-- ProfileButton goes here, pass in the necessary data -->
    </div>
  </nav>
</div>
{{end}}
