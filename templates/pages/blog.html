<!DOCTYPE html>
<html lang="en">

<head>
    {{template "metatags" .}}
    {{template "css" .}}
    {{template "js" .}}
</head>

<body class="bg-gray-900 text-white h-full">
    <div class="grid grid-rows-[auto_1fr_auto] relative w-screen min-h-screen m-auto">

        {{ template "stars" }}
        {{ template "navbar" .}}
        {{ template "all-posts" .}}

    </div>
</body>

</html>



{{ define "all-posts" }}
<section class="z-0">
    <div class="flex flex-col items-center justify-center">
        <h3 class="text-4xl font-extrabold text-center text-orange-500 m-0 sm:text-left py-12">All Posts</h3>
        <div class="flex items-center justify-center w-1/2 mx-auto">
            <ul class="text-white list-none pl-0 z-0">
                {{ range .Posts }}
                <li class="my-4 lg:my-10 first:mt-0 last:mb-0">
                    {{ template "post-card" . }}
                </li>
                {{ end }}
            </ul>
        </div>
    </div>
</section>
{{ end }}
