{{ define "recent-posts" }}
<section class="z-0">
    <div class="flex flex-col items-center justify-center">
        <h3 class="text-4xl font-extrabold text-center text-orange-500 m-0 sm:text-left py-12">Some More Recent Posts
        </h3>
        <div class="flex items-center justify-center w-1/2 mx-auto">
            <ul class="text-white list-none pl-0 z-0">
                {{ range .RecentPosts }}
                <li class="my-4 lg:my-10 first:mt-0 last:mb-0">
                    {{ template "post-card" . }}
                </li>
                {{ end }}
            </ul>
        </div>
        <a href="/blog/"
            class="text-xl font-bold text-center text-yellow-500 m-0 sm:text-left py-12 hover:underline">View all posts
        </a>
    </div>
</section>
{{ end }}
